<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <title>Simple Calculator</title>
  <style>
    button {
      border: none !important;
      border-radius: 10px !important;
      font-weight: bolder !important;
      font-size: 1.5rem !important;
      box-shadow: 1px 3px 5px 0px rgba(0, 0, 0, 0.2) !important;
    }

    button:hover {
      box-shadow: 2px 5px 7px 0px rgba(0, 0, 0, 0.3) !important;
    }

    .nav-link {
      color: rgb(46, 65, 110);
      font-family: 'Inter', sans-serif;
    }

    .nav-link:hover {
      color: #8d99b1;
    }

    .navbar-light .navbar-brand {
      color: rgb(46, 65, 110);
      font-family: 'Inter', sans-serif;
      font-weight: bolder !important;
    }

    .navbar-light .navbar-brand:hover {
      color: #8d99b1;
    }

    .card-body {
      border-radius: 20px !important;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="#">My Calculator</a>
      <ul class="nav justify-content-end">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Contact</a>
        </li>
      </ul>
    </div>
  </nav>
  <div class="container">
    <div class="row">
      <div class="col">
        <!-- blank -->
      </div>
      <div class="col">
        <!-- row 1 inside middle column -->
        <div class="row">
          <div class="col">
            <h2 class="title" style="
                margin-top: 3rem; 
                text-align: center; 
                color: rgb(46, 65, 110); 
                font-family: 'Inter', sans-serif; 
                font-weight: 600; 
                font-size: xx-large;">
              Simple Calculator
            </h2>
            <h6 class="subtext mb-2" style="color:rgb(46, 65, 110); 
                text-align: center;">
              A basic calculator for all your needs.
            </h6>
          </div>
        </div>

        <!-- row 2 inside middle column -->
        <div class="row">
          <div class="col">

            <div class="card" style="
                width: 30rem; 
                height: 35rem; 
                border-radius: 20px; 
                box-shadow: 0 4px 4px rgba(0, 0, 0, 0.2);">
              <div class="card-body" style="background: #fff7f2;">

                <div id="display-history" style="
                      font-size: 1rem; 
                      text-align: right;
                      color: #36393c; 
                      min-height: 1.2em;">
                </div>
                <!-- container inside card body -->
                <div class="container px-4">
                  <div class="row mb-2" style="
                    flex-direction: column;
                    text-align: right;
                    align-items: stretch;
                    padding: 4px 12px;
                    border-radius: 5px;
                    background-color: white;
                    box-shadow: inset 0px 0px 3px 0px rgba(0, 0, 0, 0.2);">

                    <div id="display-result" style="
                      font-size: 1.25rem; 
                      font-weight: bolder">0</div>
                  </div>
                  <!-- buttons on calculator -->
                  <div class="row gx-5 row-cols-2 mb-2">
                    <div class="col">
                      <div class="row">
                        <!-- row parent forces centering -->
                        <button type="button" class="p-3 btn btn-secondary" data-action="c" style="
                        background-color: #fcb8c3;">C</button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="del" style="
                            background-color:#dbccef;">
                          DEL
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="row gx-5 row-cols-4 mb-2">
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="7" style="
                            background-color: #fee1d2;
                            color: #32416f;
                            ">
                          7
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="8" style="
                            background-color: #fee1d2;
                            color: #32416f;">
                          8
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="9" style="
                            background-color: #fee1d2;
                            color: #32416f;">
                          9
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="operator" data-value="divide" style="
                            background-color: #fec79a;">
                          &divide;
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="row gx-5 row-cols-4 mb-2">
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="4" style="
                            background-color: #fee1d2;
                            color: #32416f;
                            ">
                          4
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="5" style="
                            background-color: #fee1d2;
                            color: #32416f;">
                          5
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="6" style="
                            background-color: #fee1d2;
                            color: #32416f;">
                          6
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="operator" data-value="multiply" style="
                            background-color: #fec79a;">
                          &times;
                        </button>

                      </div>
                    </div>
                  </div>
                  <div class="row gx-5 row-cols-4 mb-2">
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="1" style="
                            background-color: #fee1d2;
                            color: #32416f;
                            ">
                          1
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="2" style="
                            background-color: #fee1d2;
                            color: #32416f;">
                          2
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="3" style="
                            background-color: #fee1d2;
                            color: #32416f;">
                          3
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="operator" data-value="subtract" style="
                            background-color: #fec79a;">
                          &minus;
                        </button>

                      </div>
                    </div>
                  </div>
                  <div class="row gx-5 row-cols-4 mb-2">
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="0" style="
                            background-color: #cde6f2;
                            color: #32416f;
                            ">
                          0
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="number" data-value="." style="
                            background-color: #cde6f2;
                            color: #32416f;
                            ">
                          .
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="equals" style="
                            background-color:#c6e5b9;
                            color: #32416f;
                            ">
                          =
                        </button>
                      </div>
                    </div>
                    <div class="col">
                      <div class="row">
                        <button type="button" class="p-3 btn btn-secondary" data-action="operator" data-value="add" style="
                            background-color: #fdc698;
                            color: #ffff;
                            ">
                          &plus;
                        </button>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            </div>
            <div class="footer" style="color: rgb(88, 87, 87); 
            font-family: 'Inter', sans-serif;
            text-align: center;
            margin-top: 1em;">
              Need help? <a href="#" class="card-link">Check out our guide!</a>
            </div>

          </div>

        </div>
      </div>
      <div class="col">
        <!-- blank -->
      </div>
      <script src="script.js"></script>
</body>

</html>
